name: iOS Artifact

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  artifact:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Show Xcode
        run: xcodebuild -version && xcrun simctl list devices available | head -80
      - name: Verify iOS artifact
        run: scripts/check-ios-port.sh
        env:
          IOS_BOOT_SIMULATOR: "1"
